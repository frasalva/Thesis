<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Without this, mobile browsers render the page at ~980px and scale it
       down, so the (max-width: 700px) media query would never match. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bird Song 3D Visualization</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app" class="single-mode">

    <!-- Only visible on narrow viewports (see @media in style.css). Lets the
         user switch between the two species panels one-at-a-time on phones. -->
    <div id="mobile-tabs">
      <button class="mobile-tab active" data-panel="left">A</button>
      <button class="mobile-tab"        data-panel="right">B</button>
    </div>

    <div class="panel" id="panel-left">
      <div class="panel-header">
        <span class="panel-name">Species A</span>
        <select class="library-select" id="library-left" title="Pick a bundled sample">
          <option value="">library ▾</option>
        </select>
        <label class="file-btn">
          load file
          <input type="file" class="file-input" id="file-left" accept=".wav,.mp3">
        </label>
        <span class="file-name" id="fname-left"></span>
        <button id="btn-compare" class="compare-btn" title="Show a second panel to compare with another file">+ compare</button>
      </div>
      <div class="canvas-container" id="canvas-left"></div>
    </div>

    <div class="divider"></div>

    <div class="panel" id="panel-right">
      <div class="panel-header">
        <span class="panel-name">Species B</span>
        <select class="library-select" id="library-right" title="Pick a bundled sample">
          <option value="">library ▾</option>
        </select>
        <label class="file-btn">
          load file
          <input type="file" class="file-input" id="file-right" accept=".wav,.mp3">
        </label>
        <span class="file-name" id="fname-right"></span>
      </div>
      <div class="canvas-container" id="canvas-right"></div>
    </div>

    <div id="transport">
      <button id="btn-play" disabled title="Play / Pause (Space)">▶</button>
      <div id="progress-wrap">
        <div id="progress-fill"></div>
      </div>
      <span id="time-display">0.00 / 0.00 s</span>
      <span id="hint">space: play / pause &nbsp;·&nbsp; L: labels</span>
    </div>

  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
